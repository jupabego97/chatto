version: 2
project_name: chatto

before:
  hooks:
    - mise build-frontend

builds:
  - env:
      - CGO_ENABLED=0
    dir: ./cli
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  # release-please now owns the changelog (CHANGELOG.md + the GitHub
  # Release body). Don't let GoReleaser generate or attach a second one.
  disable: true

dockers:
  - image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - docker-entrypoint.sh
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/chattocorp/chatto"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
    use: buildx
    goarch: amd64
    goos: linux
  - image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - docker-entrypoint.sh
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/chattocorp/chatto"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
    use: buildx
    goarch: arm64
    goos: linux

docker_manifests:
  # Always: the fully-qualified version tag (e.g. 0.0.190, 0.1.0-alpha.1).
  - name_template: "ghcr.io/chattocorp/chatto:{{ .Version }}"
    image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"

  # Stable only: the Major.Minor floater and :latest. skip_push gates
  # these out for prerelease tags (anything with a hyphen suffix,
  # e.g. v0.1.0-alpha.1) so the prerelease line never overwrites the
  # rolling stable tags that cluster deployments may be tracking.
  - name_template: "ghcr.io/chattocorp/chatto:{{ .Major }}.{{ .Minor }}"
    skip_push: '{{ if .Prerelease }}true{{ end }}'
    image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"
  - name_template: "ghcr.io/chattocorp/chatto:latest"
    skip_push: '{{ if .Prerelease }}true{{ end }}'
    image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"

  # Prerelease only: a floating `:next` tag the dev cluster can track
  # to auto-deploy every alpha. Skipped on stable releases so it never
  # drifts to a non-prerelease build.
  - name_template: "ghcr.io/chattocorp/chatto:next"
    skip_push: '{{ if not .Prerelease }}true{{ end }}'
    image_templates:
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-amd64"
      - "ghcr.io/chattocorp/chatto:{{ .Version }}-arm64"

## R2 blob upload disabled until R2 API tokens are configured
## See: https://github.com/chattocorp/chatto/actions/runs/21843246346
# blobs:
#   - provider: s3
#     bucket: "{{ .Env.R2_BUCKET }}"
#     region: auto
#     endpoint: "https://{{ .Env.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
#     directory: "releases/{{ .Version }}"
#     include_meta: true

release:
  github:
    owner: chattocorp
    name: chatto
  # release-please creates the GitHub Release with its changelog body.
  # GoReleaser must NOT overwrite it — `keep-existing` makes GoReleaser
  # only attach artifacts to the existing release.
  mode: keep-existing
  # `auto` marks the GitHub Release as prerelease when the tag carries
  # a prerelease suffix (e.g. v0.1.0-alpha.1). release-please-action
  # already creates the Release with the correct prerelease flag for
  # prerelease tags; this is belt-and-suspenders in case GoReleaser is
  # invoked outside the release-please flow.
  prerelease: auto
