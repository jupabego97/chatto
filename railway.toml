[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Give embedded NATS + first boot time before probing.
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Railway must publish the container port that Chatto binds ($PORT).
# Set this in the service Networking settings if healthchecks stay unavailable.
