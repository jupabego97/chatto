# GitHub Container Registry pull secret
#
# Usage:
#   1. Create a GitHub Personal Access Token (classic) with `read:packages` scope
#   2. Apply with your credentials:
#
#      kubectl create secret docker-registry ghcr-pull-secret \
#        --namespace=chatto-client \
#        --docker-server=ghcr.io \
#        --docker-username=YOUR_GITHUB_USERNAME \
#        --docker-password=YOUR_GITHUB_PAT
#
# This file is a placeholder — do not commit real credentials.
