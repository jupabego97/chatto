# Beans configuration
# See: https://github.com/hmans/beans
beans:
  # Directory where bean files are stored
  path: .beans
  # Prefix for bean IDs (e.g., "myproject-abc1")
  prefix: chatto-
  # Length of the random ID suffix
  id_length: 4
  # Default status for new beans
  default_status: todo
  # Default type for new beans
  default_type: task
worktree:
  # Git ref to use as the base for new worktree branches (default: main)
  base_ref: origin/main
  integrate: pr
  setup: "mise trust && mise setup"
  run: 'echo "Starting on http://localhost:$BEANS_WORKSPACE_PORT" && CHATTO_WEBSERVER_URL=http://localhost:$BEANS_WORKSPACE_PORT CHATTO_WEBSERVER_PORT=$BEANS_WORKSPACE_PORT CHATTO_NATS_EMBEDDED_PORT=0 CHATTO_BOOTSTRAP_LOGIN=hmans CHATTO_BOOTSTRAP_EMAIL=hendrik@mans.de CHATTO_BOOTSTRAP_PASSWORD=devpassword CHATTO_BOOTSTRAP_SPACE_NAME=Chatto CHATTO_LIVEKIT_ENABLED=true CHATTO_LIVEKIT_URL=ws://localhost:7880 CHATTO_LIVEKIT_API_KEY=devkey CHATTO_LIVEKIT_API_SECRET=secret mise chatto run'
agent:
  # Enable agent functionality in the web UI (true, false)
  enabled: true
  # Default mode for agent sessions (act, plan)
  default_mode: act
server:
  # Port for the web UI (used by `beans-serve`)
  port: 8090
