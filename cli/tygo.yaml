# tygo configuration - generates TypeScript types from Go
# Run via: mise codegen-types (or tygo generate directly)

packages:
  - path: "hmans.de/chatto/internal/core"
    output_path: "../frontend/src/lib/types/core.ts"
    # Only include permission-related types
    include_files:
      - "roles.go"
      - "permission.go"
