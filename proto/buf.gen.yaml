version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: hmans.de/chatto/internal/pb
plugins:
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-go"]
    out: ../cli/internal/pb
    opt:
      - paths=source_relative
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-connect-go"]
    out: ../cli/internal/pb
    opt:
      - paths=source_relative
  - local: ../frontend/node_modules/.bin/protoc-gen-es
    out: ../frontend/src/lib/pb
    opt:
      - target=ts
    types:
      - chatto.api.v1
  - local: ../frontend/node_modules/.bin/protoc-gen-connect-es
    out: ../frontend/src/lib/pb
    opt:
      - target=ts
    types:
      - chatto.api.v1
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../docs-website/src/content/docs/reference/connectrpc-api
    opt:
      - ../proto/templates/connectrpc-index-starlight.md.tmpl,index.mdx
    types:
      - chatto.api.v1
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../docs-website/src/content/docs/reference/connectrpc-api
    opt:
      - ../proto/templates/connectrpc-starlight.md.tmpl,notification-preferences-service.mdx
    types:
      - chatto.api.v1.NotificationPreferencesService
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../docs-website/src/content/docs/reference/connectrpc-api
    opt:
      - ../proto/templates/connectrpc-starlight.md.tmpl,read-state-service.mdx
    types:
      - chatto.api.v1.ReadStateService
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../docs-website/src/content/docs/reference/connectrpc-api
    opt:
      - ../proto/templates/connectrpc-starlight.md.tmpl,room-timeline-service.mdx
    types:
      - chatto.api.v1.RoomTimelineService
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../docs-website/src/content/docs/reference/connectrpc-api
    opt:
      - ../proto/templates/connectrpc-starlight.md.tmpl,server-service.mdx
    types:
      - chatto.api.v1.ServerService
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../docs-website/src/content/docs/reference/connectrpc-api
    opt:
      - ../proto/templates/connectrpc-starlight.md.tmpl,thread-service.mdx
    types:
      - chatto.api.v1.ThreadService
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../docs-website/src/content/docs/reference/connectrpc-api
    opt:
      - ../proto/templates/connectrpc-starlight.md.tmpl,user-status-service.mdx
    types:
      - chatto.api.v1.UserStatusService
