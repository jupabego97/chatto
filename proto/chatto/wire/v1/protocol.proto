syntax = "proto3";

package chatto.wire.v1;

import "google/protobuf/timestamp.proto";
import "chatto/core/v1/event.proto";
import "chatto/core/v1/live_events.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/wire/v1;wirev1";

// ErrorCode is the stable error taxonomy for Chatto's protobuf WebSocket.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_UNAUTHENTICATED = 1;
  ERROR_CODE_PERMISSION_DENIED = 2;
  ERROR_CODE_NOT_FOUND = 3;
  ERROR_CODE_INVALID_ARGUMENT = 4;
  ERROR_CODE_UNIMPLEMENTED = 5;
  ERROR_CODE_INTERNAL = 6;
  ERROR_CODE_FULL_REFRESH_REQUIRED = 7;
  ERROR_CODE_CANCELLED = 8;
}

// InvalidationKind identifies coarse client cache surfaces affected by an event.
enum InvalidationKind {
  INVALIDATION_KIND_UNSPECIFIED = 0;
  INVALIDATION_KIND_ROOM = 1;
  INVALIDATION_KIND_ROOM_TIMELINE = 2;
  INVALIDATION_KIND_USER = 3;
  INVALIDATION_KIND_VIEWER = 4;
  INVALIDATION_KIND_SERVER = 5;
}

// ClientFrame is the outer frame sent by clients over /api/wire.
message ClientFrame {
  string frame_id = 1;

  oneof kind {
    ClientHello hello = 10;
    Request request = 11;
    CancelRequest cancel = 12;
    Ack ack = 13;
  }
}

// ServerFrame is the outer frame sent by the server over /api/wire.
message ServerFrame {
  string frame_id = 1;

  oneof kind {
    ServerHello hello = 10;
    Response response = 11;
    StreamEvent event = 12;
    WireError error = 13;
    Ping ping = 14;
  }
}

// ClientHello starts the wire session. Cookie-authenticated clients may omit
// bearer_token. Cross-origin clients can provide an opaque Chatto bearer token.
message ClientHello {
  string protocol_version = 1;
  string resume_after = 2;
  repeated string accepted_features = 3;
  string bearer_token = 4;
}

// ServerHello acknowledges a successfully authenticated wire session.
message ServerHello {
  string protocol_version = 1;
  string server_version = 2;
  repeated string methods = 3;
  repeated string features = 4;
}

// Request carries one protobuf-encoded API request message.
message Request {
  string request_id = 1;
  string method = 2;
  bytes body = 3;
}

// Response carries one protobuf-encoded API response message.
message Response {
  string request_id = 1;
  bytes body = 2;
}

// CancelRequest asks the server to cancel an in-flight request.
message CancelRequest {
  string request_id = 1;
}

// Ack acknowledges a pushed stream event. It is currently advisory.
message Ack {
  string event_id = 1;
  string delivery_cursor = 2;
}

// Ping is a transport-level liveness frame.
message Ping {
  int64 nonce = 1;
  google.protobuf.Timestamp sent_at = 2;
}

// WireError reports request or connection errors in a schemaful way.
message WireError {
  string request_id = 1;
  ErrorCode code = 2;
  string message = 3;
  bool retryable = 4;
}

// StreamEvent is the client-facing event envelope for durable EVT facts,
// transient LiveEvent signals, and synthetic heartbeat events.
message StreamEvent {
  string event_id = 1;
  string delivery_cursor = 2;
  string event_type = 3;
  repeated InvalidationHint invalidates = 4;

  oneof payload {
    chatto.core.v1.Event durable_event = 10;
    chatto.core.v1.LiveEvent live_event = 11;
    chatto.core.v1.HeartbeatEvent heartbeat = 12;
  }
}

// InvalidationHint gives older clients a fallback when they do not understand
// the concrete event payload.
message InvalidationHint {
  InvalidationKind kind = 1;
  string id = 2;
}
