syntax = "proto3";

package chatto.core.v1;

import "google/protobuf/timestamp.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

// ============================================================================
// PERSISTED MODERATION EVENT MESSAGE DEFINITIONS
// Changing field numbers or structure below affects JetStream-stored data.
//
// Top-level Event oneof tags owned by this file:
//   - 840-899: moderation events
//
// Keep these tags coordinated with event.proto. Message-internal field numbers
// are local to each message and do not consume top-level Event tag space.
// ============================================================================

// RoomMemberBannedEvent records a moderator banning a user from a channel room.
// The Event envelope actor_id is the moderator. The payload user_id is the
// target. Absence of expires_at means the ban is indefinite.
message RoomMemberBannedEvent {
  string room_id = 1;
  string user_id = 2;
  string reason = 3;
  optional google.protobuf.Timestamp expires_at = 4;
}

// RoomMemberUnbannedEvent records a moderator removing a room ban.
// The Event envelope actor_id is the moderator. The payload user_id is the
// target.
message RoomMemberUnbannedEvent {
  string room_id = 1;
  string user_id = 2;
  string reason = 3;
}
