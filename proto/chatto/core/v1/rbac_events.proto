syntax = "proto3";

package chatto.core.v1;

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

// ============================================================================
// DURABLE RBAC EVENTS (evt.rbac.>)
//
// Top-level Event oneof tags owned by this file:
//   - 800-813: durable RBAC role, assignment, and permission events
//
// Keep these tags coordinated with event.proto. Message-internal field numbers
// are local to each message and do not consume top-level Event tag space.
// ============================================================================

message RbacRoleCreatedEvent {
  string role_name = 1;
  string display_name = 2;
  string description = 3;
  int32 rank = 4;
  bool pingable = 5;
}

message RbacRoleDisplayNameChangedEvent {
  string role_name = 1;
  string display_name = 2;
}

message RbacRoleDescriptionChangedEvent {
  string role_name = 1;
  string description = 2;
}

message RbacRolePingableChangedEvent {
  string role_name = 1;
  bool pingable = 2;
}

message RbacRoleDeletedEvent {
  string role_name = 1;
}

message RbacRolesReorderedEvent {
  repeated string role_names = 1;
}

message RbacRoleAssignedEvent {
  string user_id = 1;
  string role_name = 2;
}

message RbacRoleRevokedEvent {
  string user_id = 1;
  string role_name = 2;
}

enum RbacPermissionScopeKind {
  RBAC_PERMISSION_SCOPE_KIND_UNSPECIFIED = 0;
  RBAC_PERMISSION_SCOPE_KIND_SERVER = 1;
  RBAC_PERMISSION_SCOPE_KIND_GROUP = 2;
  RBAC_PERMISSION_SCOPE_KIND_ROOM = 3;
}

message RbacPermissionScope {
  RbacPermissionScopeKind kind = 1;

  // Empty for server-scope decisions. For group and room scope, this is the
  // target group ID or room ID.
  string id = 2;
}

enum RbacPermissionSubjectKind {
  RBAC_PERMISSION_SUBJECT_KIND_UNSPECIFIED = 0;
  RBAC_PERMISSION_SUBJECT_KIND_ROLE = 1;
  RBAC_PERMISSION_SUBJECT_KIND_USER = 2;
}

message RbacPermissionSubject {
  RbacPermissionSubjectKind kind = 1;

  // Role name for ROLE subjects; user ID for USER subjects.
  string id = 2;
}

message RbacPermissionGrantedEvent {
  reserved 1, 2;
  reserved "location";

  string permission = 3;
  RbacPermissionScope scope = 4;
  RbacPermissionSubject subject = 5;
}

message RbacPermissionDeniedEvent {
  reserved 1, 2;
  reserved "location";

  string permission = 3;
  RbacPermissionScope scope = 4;
  RbacPermissionSubject subject = 5;
}

// Removes any explicit allow or deny, returning this permission to inherited/no-decision state.
message RbacPermissionClearedEvent {
  reserved 1, 2;
  reserved "location";

  string permission = 3;
  RbacPermissionScope scope = 4;
  RbacPermissionSubject subject = 5;
}
