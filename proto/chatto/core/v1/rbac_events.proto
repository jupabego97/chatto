syntax = "proto3";

package chatto.core.v1;

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

// ============================================================================
// DURABLE RBAC EVENTS (evt.rbac.>)
//
// Top-level Event oneof tags owned by this file:
//   - 800-812: durable RBAC role, assignment, and permission events
//
// Keep these tags coordinated with event.proto. Message-internal field numbers
// are local to each message and do not consume top-level Event tag space.
// ============================================================================

message RbacRoleCreatedEvent {
  string role_name = 1;
  string display_name = 2;
  string description = 3;
  int32 rank = 4;
}

message RbacRoleDisplayNameChangedEvent {
  string role_name = 1;
  string display_name = 2;
}

message RbacRoleDescriptionChangedEvent {
  string role_name = 1;
  string description = 2;
}

message RbacRoleDeletedEvent {
  string role_name = 1;
}

message RbacRolesReorderedEvent {
  repeated string role_names = 1;
}

message RbacRoleAssignedEvent {
  string user_id = 1;
  string role_name = 2;
}

message RbacRoleRevokedEvent {
  string user_id = 1;
  string role_name = 2;
}

message RbacPermissionGrantedEvent {
  string location = 1; // "server", room ID, or group ID.
  string subject = 2;
  string permission = 3;
}

message RbacPermissionDeniedEvent {
  string location = 1; // "server", room ID, or group ID.
  string subject = 2;
  string permission = 3;
}

// Removes any explicit allow or deny, returning this permission to inherited/no-decision state.
message RbacPermissionClearedEvent {
  string location = 1; // "server", room ID, or group ID.
  string subject = 2;
  string permission = 3;
}
