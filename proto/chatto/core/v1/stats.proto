syntax = "proto3";

package chatto.core.v1;

import "google/protobuf/timestamp.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

// InstanceStat is a cached counter for an instance-wide quantity (number of
// spaces, number of verified users, etc.). Stored under
// `instance.stats.{name}` in the INSTANCE KV bucket. The KV entry is the
// authoritative count for fast O(1) reads; if it ever drifts from reality,
// `chatto stats recompute` rebuilds from the underlying KV state.
message InstanceStat {
  // Current count.
  int64 count = 1;
  // When the counter was last incremented or decremented.
  google.protobuf.Timestamp updated_at = 2;
  // When the counter was last fully recomputed from authoritative state. Helps
  // operators tell how stale a counter might be if drift is suspected.
  google.protobuf.Timestamp recomputed_at = 3;
}
