syntax = "proto3";

package chatto.core.v1;

import "google/protobuf/timestamp.proto";
import "chatto/core/v1/asset_events.proto";
import "chatto/core/v1/live_events.proto";
import "chatto/core/v1/message_events.proto";
import "chatto/core/v1/rbac_events.proto";
import "chatto/core/v1/reaction_events.proto";
import "chatto/core/v1/room_events.proto";
import "chatto/core/v1/room_group_events.proto";
import "chatto/core/v1/server_config_events.proto";
import "chatto/core/v1/user_events.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

/*
   Event is the wire-format envelope for every event a user can receive.
   Both the room-scoped events that ride the SERVER_EVENTS JetStream and
   the `live.server.room.*` / `live.server.member.*` subjects, and the
   deployment-scoped events that ride the `live.server.{user,space,
   config}.*` subjects, all travel as Event messages.

   The split into two wrappers (ServerEvent + LiveEvent) was retired in
   favour of this single union — storage decisions (JetStream vs. NATS
   Core) belong to the publisher path, not the message type.

   Field-number convention for the `event` oneof:

     - **< 1000**: persisted variants. Stored in JetStream, so the
       field number is part of the on-disk wire format. **Don't change
       or reuse these numbers** — old stream bytes have to decode.

     - **1050-1051**: durable reaction variants that kept their legacy
       live tags during the EVT cutover. Treat them like persisted tags.

     - **>= 1000, except 1050-1051**: live-only variants. NATS Core only,
       never written to disk. Field numbers are less durable than persisted
       tags, but still shouldn't be reused casually because mixed-version
       processes can coexist during deploys.

   Category ownership for the top-level oneof tags is documented in the
   sibling *_events.proto files. The top-level tag is the durable/event
   envelope ID; message-internal field numbers remain local to that message.

   Authorization is determined by NATS subject, not by the wrapper:
   - Room-scoped: server.room.{kind}.{roomId}.> (JetStream) or
     live.server.room.{kind}.{roomId}.> (NATS Core)
   - Deployment-scoped: live.server.{user,space,config}.>
*/
message Event {
  // Universal event identifier (NanoID) for forward-compatibility with
  // non-NATS systems.
  string id = 1;

  // When this event was created.
  google.protobuf.Timestamp created_at = 2;

  // ID of the user who triggered this event.
  string actor_id = 3;

  reserved 9001; // was sequence_id (removed — sequence is a JetStream transport detail, not part of the event)

  // The concrete event payload.
  oneof event {
    // =================================================================
    // PERSISTED VARIANTS (< 1000) — stored in JetStream.
    // Changing field numbers or message structure below affects stored
    // data. Message definitions live in the sibling *_events.proto files.
    // =================================================================

    // ----- Room lifecycle (300-309) -----
    RoomCreatedEvent room_created = 300;
    RoomUpdatedEvent room_updated = 301;
    RoomDeletedEvent room_deleted = 302;
    RoomArchivedEvent room_archived = 303;
    RoomUnarchivedEvent room_unarchived = 304;
    // Fields 305 / 306 were RoomBecameAutoJoinEvent / RoomBecameRegularEvent.
    // Removed alongside the auto-join feature; oneof tags don't reserve,
    // so don't reuse those numbers.

    // ----- Room membership (310-329) -----
    UserJoinedRoomEvent user_joined_room = 310;
    UserLeftRoomEvent user_left_room = 311;
    SpaceMemberDeletedEvent space_member_deleted = 320;

    // ----- Messages (400-409) -----
    MessagePostedEvent message_posted = 400;
    // Durable edit / retract variants for the EVT stream (ADR-033/034/035,
    // issue #597). Named "Edited"/"Retracted" to coexist with the legacy
    // live-only MessageUpdatedEvent/MessageDeletedEvent at 1040/1041 during
    // the migration. Once phase-5 cutover lands and the live-only variants
    // are removed, we should rename these to MessageUpdatedEvent /
    // MessageDeletedEvent in a follow-up cleanup. Proto names are just
    // labels — they don't affect wire format.
    MessageEditedEvent message_edited = 401;
    MessageRetractedEvent message_retracted = 402;
    // Field 403 was ThreadReplyEchoEvent, now folded into MessagePostedEvent.
    // ----- Assets (450-459, durable) -----
    // The asset aggregate. AssetCreated establishes content identity for
    // one uploaded or generated binary; AssetProcessingStarted/Succeeded/
    // Failed track derivative work; AssetDeleted terminates the lifecycle.
    AssetCreatedEvent asset_created = 450;
    AssetProcessingStartedEvent asset_processing_started = 451;
    AssetProcessingSucceededEvent asset_processing_succeeded = 452;
    AssetProcessingFailedEvent asset_processing_failed = 453;
    AssetDeletedEvent asset_deleted = 454;

    // ----- Server config (500-509, durable) -----
    // Distinct from ServerConfigUpdatedEvent at 1000, which is the
    // legacy live-only broadcast on the SERVER_EVENTS path. The
    // durable variant below lives on the EVT stream (subject
    // evt.config.server) per ADRs 033/034/035.
    ServerConfigChangedEvent server_config_changed = 500;

    // ----- Room groups (600-609, durable, evt.group.{groupId}) -----
    // The group aggregate owns its room-membership AND room-ordering.
    // Move-room is two events (RoomRemovedFromGroup on source +
    // RoomAddedToGroup on target), matching ADR-034 Approach A.
    RoomGroupCreatedEvent room_group_created = 600;
    RoomGroupUpdatedEvent room_group_updated = 601;
    RoomGroupDeletedEvent room_group_deleted = 602;
    RoomAddedToGroupEvent room_added_to_group = 603;
    RoomRemovedFromGroupEvent room_removed_from_group = 604;
    RoomsInGroupReorderedEvent rooms_in_group_reordered = 605;

    // ----- Room layout (650-659, durable, evt.layout.{singleton}) -----
    // The layout aggregate is a singleton; the singletonID is a stable
    // constant ("default"). It owns the operator-defined inter-group
    // ordering for the sidebar. New groups appear at the end of the
    // sidebar implicitly via the RoomGroup projection's All() + the
    // reconciler in ListRoomGroupsOrdered; the layout aggregate only
    // tracks explicit reorders.
    RoomGroupsReorderedEvent room_groups_reordered = 650;

    // ----- Users (700-799, durable, evt.user.{userId}) -----
    UserAccountCreatedEvent user_account_created = 700;
    UserLoginChangedEvent user_login_changed = 701;
    UserDisplayNameChangedEvent user_display_name_changed = 702;
    UserAvatarSetEvent user_avatar_set = 703;
    UserAvatarClearedEvent user_avatar_cleared = 704;
    UserVerifiedEmailAddedEvent user_verified_email_added = 705;
    UserPasswordHashChangedEvent user_password_hash_changed = 706;
    UserOIDCSubjectLinkedEvent user_oidc_subject_linked = 707;
    UserServerPreferencesChangedEvent user_server_preferences_changed = 708;
    UserLoginCooldownClearedEvent user_login_cooldown_cleared = 709;
    UserAccountDeletedEvent user_account_deleted = 710;
    UserLoginCooldownStartedEvent user_login_cooldown_started = 711;

    // ----- RBAC (800-839, durable, evt.rbac.>) -----
    RbacRoleCreatedEvent rbac_role_created = 800;
    RbacRoleDisplayNameChangedEvent rbac_role_display_name_changed = 801;
    RbacRoleDescriptionChangedEvent rbac_role_description_changed = 802;
    RbacRoleDeletedEvent rbac_role_deleted = 803;
    RbacRolesReorderedEvent rbac_roles_reordered = 804;
    RbacRoleAssignedEvent rbac_role_assigned = 805;
    RbacRoleRevokedEvent rbac_role_revoked = 806;
    RbacPermissionGrantedEvent rbac_permission_granted = 810;
    RbacPermissionDeniedEvent rbac_permission_denied = 811;
    RbacPermissionClearedEvent rbac_permission_cleared = 812;

    // =================================================================
    // LIVE-ONLY VARIANTS (>= 1000) — never persisted, except the
    // reaction legacy-tag exception noted below.
    // These ride NATS Core only. Field numbers are less durable than
    // persisted tags, but still avoid reuse during mixed-version deploys.
    // =================================================================

    // ----- Server config (1000-1009) -----
    ServerConfigUpdatedEvent config_updated = 1000;

    // ----- User lifecycle (1010-1029) -----
    UserCreatedEvent user_created = 1010;
    UserDeletedEvent user_deleted = 1011;
    UserProfileUpdatedEvent user_profile_updated = 1012;
    ServerUserPreferencesUpdatedEvent server_user_preferences_updated = 1013;
    NotificationLevelChangedEvent notification_level_changed = 1014;
    ThreadFollowChangedEvent thread_follow_changed = 1015;

    // 1020-1029 was server-membership (UserJoinedSpaceEvent /
    // UserLeftSpaceEvent), retired. Skip these for now to keep grep
    // breadcrumbs working when tracing old logs.

    // ----- Server lifecycle (1030-1039) -----
    ServerCreatedEvent server_created = 1030;
    ServerUpdatedEvent server_updated = 1031;
    ServerDeletedEvent server_deleted = 1032;

    // ----- Message mutations (1040-1049) — KV is source of truth -----
    MessageUpdatedEvent message_updated = 1040;
    MessageDeletedEvent message_deleted = 1041;

    // ----- Reactions (1050-1059) — durable legacy-tag exception -----
    // Reaction events are stored on EVT today. They kept the legacy
    // 1050/1051 tags during the cutover, so treat these two tags as
    // frozen durable IDs even though they sit in the >=1000 range.
    ReactionAddedEvent reaction_added = 1050;
    ReactionRemovedEvent reaction_removed = 1051;

    // ----- Typing indicators (1060-1069) -----
    UserTypingEvent user_typing = 1060;

    // ----- Video processing (1070-1079) -----
    VideoProcessingCompletedEvent video_processing_completed = 1070;

    // ----- Presence (1080-1089) -----
    PresenceChangedEvent presence_changed = 1080;

    // ----- Notifications (1090-1099) -----
    MentionNotificationEvent mention_notification = 1090;
    NewDirectMessageNotificationEvent new_direct_message_notification = 1091;

    // ----- Voice calls (1100-1109) -----
    CallParticipantJoinedEvent call_participant_joined = 1100;
    CallParticipantLeftEvent call_participant_left = 1101;

    // ----- Notification sync (1110-1119) -----
    NotificationCreatedEvent notification_created = 1110;
    NotificationDismissedEvent notification_dismissed = 1111;

    // ----- Unread indicators (1120-1129) -----
    // 1120 was NewMessageInSpaceEvent (retired in ADR-030 cleanup —
    // MessagePostedEvent on the per-room subject covers the same use case).
    RoomMarkedAsReadEvent room_marked_as_read = 1121;
    MentionStatusClearedEvent mention_status_cleared = 1122;

    // ----- Room layout (1130-1139) -----
    RoomGroupsUpdatedEvent room_groups_updated = 1130;

    // ----- Session termination (1140-1149) -----
    SessionTerminatedEvent session_terminated = 1140;

    // ----- Subscription liveness (1200-1209) -----
    // Synthetic heartbeat — never published over NATS. Emitted directly
    // into the subscription channel by StreamMyEvents so clients can
    // detect a dead subscription on an otherwise-healthy WebSocket and
    // trigger a reconnect.
    HeartbeatEvent heartbeat = 1200;
  }
}
