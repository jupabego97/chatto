syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";

// Mode of a pending external identity confirmation flow.
enum ExternalIdentityFlowKind {
  // The flow kind was not specified.
  EXTERNAL_IDENTITY_FLOW_KIND_UNSPECIFIED = 0;
  // Create a new passwordless account and link the provider identity.
  EXTERNAL_IDENTITY_FLOW_KIND_CREATE_ACCOUNT = 1;
  // Link the provider identity to the authenticated account.
  EXTERNAL_IDENTITY_FLOW_KIND_LINK_ACCOUNT = 2;
}

// Public metadata for a configured external login provider.
message ExternalIdentityProvider {
  // Stable configured provider ID.
  string id = 1;
  // Provider type, such as "oidc", "github", or "discord".
  string type = 2;
  // Human-readable label.
  string label = 3;
  // URL that starts login for this provider.
  string login_url = 4;
  // URL that starts authenticated account linking for this provider. Clients
  // should use StartExternalIdentityLink instead of navigating here directly.
  string link_url = 5;
  // True when this provider is already linked to the authenticated user.
  bool linked = 6;
  // Linked identity subject hash for this provider, when linked.
  string linked_identity_subject_hash = 7;
}

// Metadata about a pending external identity flow. The provider subject is not
// exposed; clients only need user-facing provider/profile hints.
message PendingExternalIdentity {
  // Pending flow kind.
  ExternalIdentityFlowKind kind = 1;
  // Provider ID that produced the identity.
  string provider_id = 2;
  // Provider type that produced the identity.
  string provider_type = 3;
  // Provider label shown to the user.
  string provider_label = 4;
  // Verified email supplied by the provider, when available.
  string verified_email = 5;
  // Suggested username derived from provider profile hints.
  string login_hint = 6;
  // Suggested display name derived from provider profile hints.
  string display_name_hint = 7;
  // User ID this link flow is bound to. Empty for create flows.
  string bound_user_id = 8;
  // Internal path the client should return to after confirmation.
  string redirect_path = 9;
}

// Linked provider identity metadata for the authenticated user's settings UI.
message LinkedExternalIdentity {
  // Provider ID recorded when the identity was linked.
  string provider_id = 1;
  // Provider type recorded when the identity was linked.
  string provider_type = 2;
  // Current or fallback provider label.
  string provider_label = 3;
  // Stable one-way subject hash, useful only as a UI/list key.
  string subject_hash = 4;
}

// Request to inspect a pending external identity flow.
message GetPendingExternalIdentityRequest {
  // Raw pending flow token from the provider callback redirect.
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

// Result of inspecting a pending external identity flow.
message GetPendingExternalIdentityResponse {
  // Pending flow metadata.
  PendingExternalIdentity pending = 1;
}

// Request to create a new passwordless account from a pending provider identity.
message CreateExternalIdentityAccountRequest {
  // Raw pending create token from the provider callback redirect.
  string token = 1 [(buf.validate.field).string.min_len = 1];
  // Desired username.
  string login = 2 [(buf.validate.field).string = {
    min_len: 2
    max_len: 32
  }];
}

// Result of creating an account from a pending provider identity.
message CreateExternalIdentityAccountResponse {
  // Newly created user ID.
  string user_id = 1;
  // Newly created username.
  string login = 2;
  // Bearer token for the new session.
  string token = 3;
}

// Request to cancel a pending external identity flow.
message CancelExternalIdentityFlowRequest {
  // Raw pending flow token.
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

// Result of cancelling a pending external identity flow.
message CancelExternalIdentityFlowResponse {
  // True when a pending flow was removed or already absent.
  bool cancelled = 1;
}

// Request to confirm a pending provider link using the flow capability token.
message ConfirmExternalIdentityLinkRequest {
  // Raw pending link token from the provider callback redirect.
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

// Result of confirming a provider identity link.
message ConfirmExternalIdentityLinkResponse {
  // Linked identity metadata.
  LinkedExternalIdentity linked_identity = 1;
}

// Request to list configured and linked external identities for the current user.
message ListExternalIdentitiesRequest {}

// Result of listing configured and linked external identities.
message ListExternalIdentitiesResponse {
  // Configured providers the user may link.
  repeated ExternalIdentityProvider providers = 1;
  // Provider identities already linked to the authenticated user.
  repeated LinkedExternalIdentity linked_identities = 2;
}

// Request to start linking a configured provider to the current user.
message StartExternalIdentityLinkRequest {
  // Provider ID to link.
  string provider_id = 1 [(buf.validate.field).string.min_len = 1];
  // Internal path to return to after confirmation.
  string redirect_path = 2;
  // Current password proof for accounts with a password when the active
  // runtime credential is no longer fresh.
  string current_password = 3;
}

// Result of preparing an external identity link flow.
message StartExternalIdentityLinkResponse {
  // Browser URL that starts provider authorization on the target server origin.
  string start_url = 1;
}

// Request to link a pending provider identity to the authenticated user.
message LinkExternalIdentityRequest {
  // Raw pending link token from the provider callback redirect.
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

// Result of linking a provider identity.
message LinkExternalIdentityResponse {
  // Linked identity metadata.
  LinkedExternalIdentity linked_identity = 1;
}

// Request to disconnect a linked provider identity from the authenticated user.
message DisconnectExternalIdentityRequest {
  // Stable one-way subject hash of the linked identity to disconnect.
  string subject_hash = 1 [(buf.validate.field).string.min_len = 1];
  // Current password proof for accounts with a password when the active
  // runtime credential is no longer fresh.
  string current_password = 2;
}

// Result of disconnecting a provider identity.
message DisconnectExternalIdentityResponse {
  // True when the identity was disconnected.
  bool disconnected = 1;
}

// Public pending external identity flow operations.
service ExternalIdentityFlowService {
  // Reads safe metadata for a pending create/link flow.
  rpc GetPendingExternalIdentity(GetPendingExternalIdentityRequest) returns (GetPendingExternalIdentityResponse);
  // Creates a passwordless account from a pending provider identity.
  rpc CreateExternalIdentityAccount(CreateExternalIdentityAccountRequest) returns (CreateExternalIdentityAccountResponse);
  // Links a provider identity using a pending link-flow capability token.
  rpc ConfirmExternalIdentityLink(ConfirmExternalIdentityLinkRequest) returns (ConfirmExternalIdentityLinkResponse);
  // Cancels a pending provider identity flow.
  rpc CancelExternalIdentityFlow(CancelExternalIdentityFlowRequest) returns (CancelExternalIdentityFlowResponse);
}

// Authenticated external identity management.
service ExternalIdentityService {
  // Lists providers and identities linked to the authenticated account.
  rpc ListExternalIdentities(ListExternalIdentitiesRequest) returns (ListExternalIdentitiesResponse);
  // Creates a short-lived browser handoff URL for linking a provider identity.
  rpc StartExternalIdentityLink(StartExternalIdentityLinkRequest) returns (StartExternalIdentityLinkResponse);
  // Links a pending provider identity to the authenticated account.
  rpc LinkExternalIdentity(LinkExternalIdentityRequest) returns (LinkExternalIdentityResponse);
  // Disconnects a provider identity from the authenticated account.
  rpc DisconnectExternalIdentity(DisconnectExternalIdentityRequest) returns (DisconnectExternalIdentityResponse);
}
