syntax = "proto3";

package chatto.api.v1;

// Describes one login provider exposed by the server discovery endpoint.
//
// Clients can render these providers before a user has authenticated.
message AuthProvider {
  // Stable provider identifier used by clients when starting login.
  string id = 1;
  // Provider category, such as "password" or "oidc". Clients should treat
  // unknown provider types as unsupported.
  string type = 2;
  // Human-readable provider label for login UI.
  string label = 3;
  // URL that starts login for this provider.
  string login_url = 4;
}

// Request for public server metadata.
message GetServerRequest {}

// Public server profile, identity, and branding fields.
message ServerPublicProfile {
  // Display name of the Chatto server.
  string name = 1;
  // Server software version.
  string version = 2;
  // Optional server logo URL.
  optional string logo_url = 3;
  // Optional server banner URL.
  optional string banner_url = 4;
  // Optional welcome message.
  optional string welcome_message = 5;
  // Optional server description.
  optional string description = 6;
}

// Login and registration options exposed before authentication.
message ServerLogin {
  // Whether users can create accounts through the public UI.
  bool direct_registration_enabled = 1;
  // Configured login providers.
  repeated AuthProvider providers = 2;
  // URL for the legacy authorization flow, when enabled.
  string authorize_url = 3;
}

// Public metadata clients need before they can authenticate or render the
// initial server view.
message GetServerResponse {
  // Public server profile and branding.
  ServerPublicProfile profile = 1;
  // Login and registration options.
  ServerLogin login = 2;
}

// Provides public server discovery metadata.
service ServerDiscoveryService {
  // Returns public server metadata, branding, registration status, and login
  // provider information. This RPC is available before login so clients can
  // render the first server screen and authentication choices.
  rpc GetServer(GetServerRequest) returns (GetServerResponse);
}
