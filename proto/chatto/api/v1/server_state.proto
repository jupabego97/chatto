syntax = "proto3";

package chatto.api.v1;

import "chatto/api/v1/permissions.proto";
import "chatto/api/v1/server.proto";

// Server profile fields visible to authenticated members.
message ServerMemberProfile {
  // Public server profile and branding.
  ServerPublicProfile public_profile = 1;
  // Optional message of the day shown to authenticated members.
  optional string motd = 2;
}

// Effective server/channel permission decisions for the authenticated user.
message ServerViewerPermissions {
  // One row per permission known to the server.
  repeated PermissionGrant permissions = 1;
}

// Non-permission server state for the authenticated user.
message ServerViewerState {
  // Whether any joined channel room has unread messages.
  bool has_unread_rooms = 1;
}

// Request for authenticated server state.
message GetServerStateRequest {}

// Authenticated server runtime settings used by clients.
message ServerRuntimeConfig {
  // Whether Web Push notifications are fully configured.
  bool push_notifications_enabled = 1;
  // Optional VAPID public key for Web Push registration.
  optional string vapid_public_key = 2;
  // Optional LiveKit URL for voice calls.
  optional string livekit_url = 3;
  // Whether direct email/password registration is enabled.
  bool direct_registration_enabled = 4;
  // Whether video processing is enabled.
  bool video_processing_enabled = 5;
  // Maximum general upload size in bytes.
  int64 max_upload_size = 6;
  // Maximum video upload size in bytes.
  int64 max_video_upload_size = 7;
  // Message edit window in seconds.
  int32 message_edit_window_seconds = 8;
}

// Authenticated server state used by the web client and public API clients.
message GetServerStateResponse {
  // Authenticated server profile and branding.
  ServerMemberProfile profile = 1;
  // Authenticated runtime settings used by clients.
  ServerRuntimeConfig runtime = 2;
  // Effective server/channel permission decisions for the authenticated user.
  ServerViewerPermissions viewer_permissions = 3;
  // Non-permission server state for the authenticated user.
  ServerViewerState viewer_state = 4;
}

// Provides authenticated server state and current user's server capabilities.
service ServerService {
  // Returns authenticated server state. This RPC requires a logged-in user;
  // public discovery remains available through
  // ServerDiscoveryService.GetServer.
  rpc GetServerState(GetServerStateRequest) returns (GetServerStateResponse);
}
