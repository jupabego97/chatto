syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";
import "chatto/api/v1/room_timeline.proto";

// Link preview metadata submitted with a posted message.
//
// The server validates and stores this data with the message body. Clients
// should omit this field when no preview was selected.
message MessageLinkPreviewInput {
  // Previewed URL.
  string url = 1;
  // Page or embed title.
  string title = 2;
  // Page or embed description.
  string description = 3;
  // Site name, when known.
  string site_name = 4;
  // Existing server asset ID for the preview image, when available.
  string image_asset_id = 5;
  // Embed provider or type, when recognized.
  string embed_type = 6;
  // Provider-specific embed ID, when recognized.
  string embed_id = 7;
}

// Attachment bytes submitted with a message post.
//
// Each attachment is uploaded as a room-scoped asset before the message is
// committed. The message service validates per-file limits and permissions.
message MessageAttachmentUpload {
  // Raw file bytes.
  bytes content = 1;
  // Original filename supplied by the client.
  string filename = 2;
  // MIME content type supplied by the client. Empty values are treated as
  // application/octet-stream.
  string content_type = 3;
}

// Request to post a message in a room or thread.
message PostMessageRequest {
  // Required. Room where the message should be posted.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Message body text. Required unless attachments or attachment_asset_ids is
  // non-empty.
  string body = 2;
  // Existing room-scoped attachment asset IDs to include with the message.
  repeated string attachment_asset_ids = 3;
  // Event ID of the thread root message when posting a thread reply.
  string thread_root_event_id = 4;
  // Event ID this message replies to for attribution.
  string in_reply_to = 5;
  // True to also echo a thread reply into the main room timeline.
  bool also_send_to_channel = 6;
  // Short-lived token returned by a prior mention confirmation challenge.
  string mention_confirmation_token = 7;
  // Link preview selected by the client.
  MessageLinkPreviewInput link_preview = 8;
  // Browser-uploaded attachments to include with the message.
  repeated MessageAttachmentUpload attachments = 9;
}

// Large mention confirmation details for a message that was not posted.
message MentionConfirmationChallenge {
  // Number of people the message would notify.
  int32 recipient_count = 1;
  // Short-lived token to send back with the same message after user approval.
  string token = 2;
}

// Result of posting a message.
message PostMessageResponse {
  oneof result {
    // Renderable timeline event for the posted message.
    RoomTimelineEvent event = 1;
    // Challenge shown when a message would notify many people.
    MentionConfirmationChallenge mention_confirmation = 2;
  }
  // Related entities needed to render event when a message was posted.
  RoomTimelineIncludes includes = 3;
}

// Request to edit a message body.
message UpdateMessageRequest {
  // Required. Room containing the message.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the message to edit.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
  // New message body text.
  string body = 3 [(buf.validate.field).string.max_len = 10000];
  // For thread replies, whether a channel echo should exist after saving.
  // Omit to preserve the current echo state.
  optional bool also_send_to_channel = 4;
}

// Result of editing a message.
message UpdateMessageResponse {
  // True when the edit was accepted.
  bool updated = 1;
}

// Request to retract a message.
message DeleteMessageRequest {
  // Required. Room containing the message.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the message to retract.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
}

// Result of retracting a message.
message DeleteMessageResponse {
  // True when the delete/retract request was accepted.
  bool deleted = 1;
}

// Request to remove one attachment from a message.
message DeleteAttachmentRequest {
  // Required. Room containing the message.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the message containing the attachment.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
  // Required. Attachment ID to remove from the message.
  string attachment_id = 3 [(buf.validate.field).string.min_len = 1];
}

// Result of removing one attachment from a message.
message DeleteAttachmentResponse {
  // True when the attachment removal was accepted.
  bool deleted = 1;
}

// Request to remove the accepted link preview from a message.
message DeleteLinkPreviewRequest {
  // Required. Room containing the message.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Required. Event ID of the message containing the link preview.
  string event_id = 2 [(buf.validate.field).string.min_len = 1];
  // Required. URL of the link preview to remove.
  string url = 3 [(buf.validate.field).string.min_len = 1];
}

// Result of removing a link preview from a message.
message DeleteLinkPreviewResponse {
  // True when the link preview removal was accepted.
  bool deleted = 1;
}

// Request to publish a live-only typing indicator.
message SendTypingIndicatorRequest {
  // Required. Room where the current user is typing.
  string room_id = 1 [(buf.validate.field).string.min_len = 1];
  // Event ID of the thread root when typing inside a thread.
  string thread_root_event_id = 2;
}

// Result of publishing a typing indicator.
message SendTypingIndicatorResponse {
  // True when the typing indicator was accepted for publish.
  bool sent = 1;
}

// Posts messages into room and thread timelines.
service MessageService {
  // Posts a message for the current user. The user must be a room member and
  // must have message.post for room messages or message.post-in-thread for
  // thread replies. Echoing a thread reply also requires message.echo and
  // message.post.
  rpc PostMessage(PostMessageRequest) returns (PostMessageResponse);
  // Edits a message body. Authors can edit their own messages within the edit
  // window. Non-authors need message.manage and cannot change channel echo
  // state.
  rpc UpdateMessage(UpdateMessageRequest) returns (UpdateMessageResponse);
  // Retracts a message. Authors can delete their own messages. Non-authors need
  // message.manage.
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  // Removes one attachment from the author's own message.
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (DeleteAttachmentResponse);
  // Removes the accepted link preview from the author's own message.
  rpc DeleteLinkPreview(DeleteLinkPreviewRequest) returns (DeleteLinkPreviewResponse);
  // Publishes a live-only typing indicator. Room membership is required; message
  // posting permission is not.
  rpc SendTypingIndicator(SendTypingIndicatorRequest) returns (SendTypingIndicatorResponse);
}
