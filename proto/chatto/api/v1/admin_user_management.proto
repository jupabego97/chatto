syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";
import "chatto/api/v1/account.proto";
import "google/protobuf/timestamp.proto";

// User row returned by server-admin member management reads.
message AdminMember {
  // Stable user ID.
  string id = 1;
  // Login identifier.
  string login = 2;
  // Display name shown in Chatto.
  string display_name = 3;
  // Optional avatar URL.
  optional string avatar_url = 4;
  // Explicit server role assignments. The implicit everyone role is omitted.
  repeated string roles = 5;
  // Account creation time, when known.
  google.protobuf.Timestamp created_at = 6;
  // Whether the account has been deleted.
  bool deleted = 7;
  // Whether the caller may see that the user has a verified email and one exists.
  bool has_verified_email = 8;
  // Verified email addresses visible to the caller.
  repeated string verified_emails = 9;
  // Whether the caller may delete this account.
  bool viewer_can_delete_account = 10;
  // Last self-service username change, when visible and known.
  google.protobuf.Timestamp last_login_change = 11;
}

// Role summary used by member list filters and badges.
message AdminMemberRoleSummary {
  // Stable role name.
  string name = 1;
  // Display name shown in admin UI.
  string display_name = 2;
}

// Server role details used by the member detail role-assignment UI.
message AdminMemberRole {
  // Stable role name.
  string name = 1;
  // Display name shown in admin UI.
  string display_name = 2;
  // Display/order position.
  int32 position = 3;
  // Server permissions granted by this role.
  repeated string permissions = 4;
  // Server permissions denied by this role.
  repeated string permission_denials = 5;
}

// Request server-admin member rows.
message ListMembersRequest {
  // Optional case-insensitive login/display-name search term.
  optional string search = 1;
  // Maximum rows to return. Defaults to 20 and is capped at 100.
  int32 limit = 2 [(buf.validate.field).int32.gte = 0];
  // Number of matching rows to skip.
  int32 offset = 3 [(buf.validate.field).int32.gte = 0];
}

// Server-admin member rows plus role summaries.
message ListMembersResponse {
  // Matching users.
  repeated AdminMember users = 1;
  // Server roles for display-name lookup.
  repeated AdminMemberRoleSummary roles = 2;
  // Total matching user count before pagination.
  int32 total_count = 3;
  // Whether more matching rows exist after this page.
  bool has_more = 4;
}

// Request one server-admin member detail record.
message GetMemberRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
}

// Server-admin member detail payload.
message GetMemberResponse {
  // Member record, when found.
  AdminMember member = 1;
  // Server roles for assignment UI.
  repeated AdminMemberRole roles = 2;
  // Server permissions available for per-user overrides.
  repeated string available_permissions = 3;
  // Whether the caller may assign/revoke roles.
  bool viewer_can_assign_roles = 4;
  // Whether the caller may edit role definitions.
  bool viewer_can_manage_roles = 5;
  // Whether the caller may edit direct user permissions.
  bool viewer_can_manage_user_permissions = 6;
}

// Request to assign a server role to a user.
message AssignRoleRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Role name to assign.
  string role_name = 2 [(buf.validate.field).string.min_len = 1];
}

// Result of assigning a server role.
message AssignRoleResponse {
  // True when the request completed.
  bool assigned = 1;
}

// Request to revoke a server role from a user.
message RevokeRoleRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Role name to revoke.
  string role_name = 2 [(buf.validate.field).string.min_len = 1];
}

// Result of revoking a server role.
message RevokeRoleResponse {
  // True when the request completed.
  bool revoked = 1;
}

// Request to update a user's identity as a server-admin action.
message UpdateUserRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // New display name, when changing it.
  optional string display_name = 2;
  // New login identifier, when changing it.
  optional string login = 3;
}

// Result of an admin user update.
message UpdateUserResponse {
  // Updated user profile.
  AccountUser user = 1;
}

// Request to clear a user's self-service username-change cooldown.
message ClearUsernameCooldownRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
}

// Result of clearing a user's username-change cooldown.
message ClearUsernameCooldownResponse {
  // True when the request completed.
  bool cleared = 1;
}

// Server-admin user identity and cooldown commands.
service AdminUserManagementService {
  // Lists server members for the admin members screen.
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  // Gets one server member plus role/permission metadata for admin details.
  rpc GetMember(GetMemberRequest) returns (GetMemberResponse);
  // Assigns a server role to a user.
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  // Revokes a server role from a user.
  rpc RevokeRole(RevokeRoleRequest) returns (RevokeRoleResponse);
  // Updates a user's login and/or display name as an admin action.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  // Clears the target user's self-service username-change cooldown.
  rpc ClearUsernameCooldown(ClearUsernameCooldownRequest) returns (ClearUsernameCooldownResponse);
}
