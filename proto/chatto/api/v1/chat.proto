}

// GetThreadEventsAroundRequest requests a thread window centered around one reply.
message GetThreadEventsAroundRequest {
  string room_id = 1;
  string thread_root_event_id = 2;
  string anchor_event_id = 3;
  int32 limit = 4;
}

message GetThreadEventsAroundResponse {
  RoomEventView root_event = 1;
  RoomEventsPage replies = 2;
}

message FollowedThreadView {
  string room_id = 1;
  chatto.core.v1.Room room = 2;
  string thread_root_event_id = 3;
  RoomEventView root_message = 4;
  int32 reply_count = 5;
  google.protobuf.Timestamp last_reply_at = 6;
  bool has_unread = 7;
  repeated UserAvatarView thread_participants = 8;
}

message ListMyFollowedThreadsRequest {
