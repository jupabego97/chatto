// AssetUrl is the stable browser-loadable URL shape used by message attachments.
message AssetUrl {
  string url = 1;
  google.protobuf.Timestamp expires_at = 2;
}

// AssetFitMode is used by protobuf HTTP helpers that request transformed assets.
enum AssetFitMode {
  ASSET_FIT_MODE_UNSPECIFIED = 0;
  ASSET_FIT_MODE_CONTAIN = 1;
  ASSET_FIT_MODE_COVER = 2;
  ASSET_FIT_MODE_EXACT = 3;
}

// VideoProcessingStatus mirrors the GraphQL video processing enum for the chat UI.
enum VideoProcessingStatus {
  VIDEO_PROCESSING_STATUS_UNSPECIFIED = 0;
  VIDEO_PROCESSING_STATUS_PROCESSING = 1;
  VIDEO_PROCESSING_STATUS_COMPLETED = 2;
  VIDEO_PROCESSING_STATUS_FAILED = 3;
}

// VideoVariantView is a display-ready video derivative entry.
message VideoVariantView {
  string quality = 1;
  int32 width = 2;
  int32 height = 3;
  int64 size = 4;
  AssetUrl asset_url = 5;
}

// VideoProcessingView is the display-ready processing state for a video attachment.
message VideoProcessingView {
  VideoProcessingStatus status = 1;
  optional int64 duration_ms = 2;
  optional int32 width = 3;
  optional int32 height = 4;
  bool source_available = 5;
  optional string reason_code = 6;
  AssetUrl thumbnail_asset_url = 7;
  repeated VideoVariantView variants = 8;
}

// AttachmentView is an attachment hydrated with URLs needed by browser clients.
message AttachmentView {
  string id = 1;
  string filename = 2;
  string content_type = 3;
  int32 width = 4;
  int32 height = 5;
  AssetUrl asset_url = 6;
  AssetUrl thumbnail_asset_url = 7;
  VideoProcessingView video_processing = 8;
}

// UploadedAttachment is an uploaded attachment plus transient processing hints.
message UploadedAttachment {
  chatto.core.v1.Attachment attachment = 1;
  bool needs_video_processing = 2;
}

// UploadRoomAttachmentsResponse is returned by the multipart room upload endpoint.
message UploadRoomAttachmentsResponse {
  repeated UploadedAttachment attachments = 1;
  repeated string video_processing_asset_ids = 2;
}

// RefreshMessageAttachmentUrlsRequest requests freshly signed URLs for one message.
message RefreshMessageAttachmentUrlsRequest {
  string room_id = 1;
  string event_id = 2;
  int32 thumbnail_width = 3;
  int32 thumbnail_height = 4;
  AssetFitMode thumbnail_fit = 5;
}

// RefreshMessageAttachmentUrlsResponse returns attachment views with fresh URLs.
message RefreshMessageAttachmentUrlsResponse {
  repeated AttachmentView attachments = 1;
}

// UserAvatarAssetResponse is returned by the HTTP avatar upload/delete endpoints.
message UserAvatarAssetResponse {
  chatto.core.v1.User user = 1;
  string avatar_url = 2;
}

// ServerBrandingAssetResponse is returned by the HTTP server logo/banner endpoints.
message ServerBrandingAssetResponse {
  ServerProfileView profile = 1;
}

// LinkPreviewView is the link preview shape consumed by the room UI.
message LinkPreviewView {
  string url = 1;
  string title = 2;
  string description = 3;
  string site_name = 4;
  optional string image_url = 5;
  string embed_type = 6;
  optional string embed_id = 7;
  optional string image_asset_id = 8;
}

message LinkPreviewInput {
  string url = 1;
  optional string title = 2;
  optional string description = 3;
  optional string site_name = 4;
  optional string image_asset_id = 5;
  optional string embed_type = 6;
  optional string embed_id = 7;
}

message GetLinkPreviewRequest {
  string url = 1;
}

message GetLinkPreviewResponse {
  LinkPreviewView preview = 1;
}

// ReactionSummaryView is a message reaction summary from the viewer's perspective.
message ReactionSummaryView {
  string emoji = 1;
  int32 count = 2;
  bool has_reacted = 3;
  repeated UserAvatarView users = 4;
}

// MessagePostedView is a display-ready MessagePostedEvent payload.
message MessagePostedView {
  string room_id = 1;
  optional string body = 2;
  repeated AttachmentView attachments = 3;
  LinkPreviewView link_preview = 4;
  optional google.protobuf.Timestamp updated_at = 5;
  optional string in_reply_to = 6;
  optional string thread_root_event_id = 7;
  optional string echo_of_event_id = 8;
  optional string echo_from_thread_root_event_id = 9;
  optional string channel_echo_event_id = 10;
  int32 reply_count = 11;
  optional google.protobuf.Timestamp last_reply_at = 12;
  repeated UserAvatarView thread_participants = 13;
  optional bool viewer_is_following_thread = 14;
  repeated ReactionSummaryView reactions = 15;
}

// MessageEditedView is a display-ready MessageEditedEvent payload.
message MessageEditedView {
  string room_id = 1;
  string message_event_id = 2;
  optional string body = 3;
  repeated AttachmentView attachments = 4;
  LinkPreviewView link_preview = 5;
  optional google.protobuf.Timestamp updated_at = 6;
}

message MessageRetractedView {
  string room_id = 1;
  string message_event_id = 2;
  optional string reason = 3;
}

message RoomScopedEventView {
  string room_id = 1;
}

message ReactionEventView {
  string room_id = 1;
  string message_event_id = 2;
  string emoji = 3;
}

message AssetProcessingEventView {
  string room_id = 1;
  string asset_id = 2;
  string message_event_id = 3;
}

message AssetDeletedView {
  string room_id = 1;
  string asset_id = 2;
}

message ServerMemberDeletedView {
  string user_id = 1;
}

message CallEventView {
  string room_id = 1;
  string call_id = 2;
}

message ThreadCreatedView {
  string room_id = 1;
  string thread_root_event_id = 2;
}

message RoomModerationEventView {
  string room_id = 1;
  string user_id = 2;
  optional string reason = 3;
  optional google.protobuf.Timestamp expires_at = 4;
}

// RoomEventPayload is the schemaful display payload for a room timeline row.
message RoomEventPayload {
  oneof payload {
    MessagePostedView message_posted = 1;
    MessageEditedView message_edited = 2;
    MessageRetractedView message_retracted = 3;
    RoomScopedEventView room_created = 4;
    RoomScopedEventView room_updated = 5;
    RoomScopedEventView room_deleted = 6;
    RoomScopedEventView room_archived = 7;
    RoomScopedEventView room_unarchived = 8;
    RoomScopedEventView user_joined_room = 9;
    RoomScopedEventView user_left_room = 10;
    ReactionEventView reaction_added = 11;
    ReactionEventView reaction_removed = 12;
    AssetProcessingEventView asset_processing_started = 13;
    AssetProcessingEventView asset_processing_succeeded = 14;
    AssetProcessingEventView asset_processing_failed = 15;
    AssetDeletedView asset_deleted = 16;
    ServerMemberDeletedView server_member_deleted = 17;
    CallEventView call_started = 18;
    CallEventView call_participant_joined = 19;
    CallEventView call_participant_left = 20;
    CallEventView call_ended = 21;
    ThreadCreatedView thread_created = 22;
    RoomModerationEventView room_member_banned = 23;
    RoomModerationEventView room_member_unbanned = 24;
  }
}

// RoomEventView is a display-ready room event plus the raw durable event for fallback clients.
message RoomEventView {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  string actor_id = 3;
  UserAvatarView actor = 4;
  uint64 sequence = 5;
  chatto.core.v1.Event raw_event = 6;
  RoomEventPayload event = 7;
}

// RoomEventsPage is the shared paginated room-event response body.
message RoomEventsPage {
  repeated RoomEventView events = 1;
  bool has_older = 2;
  bool has_newer = 3;
  uint64 start_sequence = 4;
  uint64 end_sequence = 5;
  int32 target_index = 6;
}

// GetRoomEventRequest requests one visible event by ID.
message GetRoomEventRequest {
  string room_id = 1;
  string event_id = 2;
}

// GetRoomEventResponse returns one hydrated event, if visible to the viewer.
message GetRoomEventResponse {
  RoomEventView event = 1;
}

// GetRoomTimelineRequest requests visible room timeline events.
message GetRoomTimelineRequest {
  string room_id = 1;
  int32 limit = 2;
  uint64 before_sequence = 3;
}

// TimelineEvent pairs a room event with its EVT stream sequence.
message TimelineEvent {
  chatto.core.v1.Event event = 1;
  uint64 sequence = 2;
}

// GetRoomTimelineResponse returns a page of room timeline events.
message GetRoomTimelineResponse {
  repeated TimelineEvent events = 1;
  bool has_older = 2;
  bool has_newer = 3;
  uint64 start_sequence = 4;
  uint64 end_sequence = 5;
  repeated RoomEventView event_views = 6;
}

// GetRoomTimelineAfterRequest requests events newer than an existing cursor.
message GetRoomTimelineAfterRequest {
  string room_id = 1;
  int32 limit = 2;
  uint64 after_sequence = 3;
}

message GetRoomTimelineAfterResponse {
  RoomEventsPage page = 1;
}

// GetRoomTimelineAroundRequest requests a window centered around one event.
message GetRoomTimelineAroundRequest {
  string room_id = 1;
  string event_id = 2;
  int32 limit = 3;
}

message GetRoomTimelineAroundResponse {
  RoomEventsPage page = 1;
}

// GetThreadEventsRequest requests a thread root and a reply page.
message GetThreadEventsRequest {
  string room_id = 1;
  string thread_root_event_id = 2;
  int32 limit = 3;
  uint64 before_sequence = 4;
  uint64 after_sequence = 5;
}

message GetThreadEventsResponse {
