name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch release branches
        run: git fetch origin '+refs/heads/main:refs/remotes/origin/main' '+refs/heads/release-*:refs/remotes/origin/release-*'

      - name: Verify release-please tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"

          source_branch=""
          if git merge-base --is-ancestor "$tag_commit" origin/main; then
            source_branch="main"
          else
            while IFS= read -r ref; do
              if git merge-base --is-ancestor "$tag_commit" "$ref"; then
                source_branch="${ref#refs/remotes/origin/}"
                break
              fi
            done < <(git for-each-ref --format='%(refname)' refs/remotes/origin/release-)
          fi

          if [[ -z "$source_branch" ]]; then
            echo "::error::Refusing to release ${GITHUB_REF_NAME}: tagged commit is not reachable from origin/main or an origin/release-* branch."
            exit 1
          fi

          echo "source_branch=${source_branch}" >> "$GITHUB_OUTPUT"

          parent_count="$(git rev-list --parents -n 1 "$tag_commit" | awk '{ print NF - 1 }')"
          if [[ "$parent_count" -lt 1 ]]; then
            echo "::error::Refusing to release ${GITHUB_REF_NAME}: tagged commit has no parent to compare against."
            exit 1
          fi

          disallowed=()
          while IFS= read -r path; do
            case "$path" in
              .release-please-config.json|\
              .release-please-config-main.json|\
              .release-please-manifest.json|\
              .release-please-manifest-main.json|\
              CHANGELOG.md|\
              cli/version.go|\
              frontend/package.json)
                ;;
              *)
                disallowed+=("$path")
                ;;
            esac
          done < <(git diff --name-only "${tag_commit}^" "$tag_commit")

          if (( ${#disallowed[@]} > 0 )); then
            echo "::error::Refusing to release ${GITHUB_REF_NAME}: tagged commit contains non-release-please files."
            printf 'Disallowed file: %s\n' "${disallowed[@]}"
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"
          push_latest=false
          if [[ "$version" != *-* ]]; then
            highest_stable="$(
              git tag --list 'v[0-9]*.[0-9]*.[0-9]*' |
                sed 's/^v//' |
                grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' |
                sort -V |
                tail -n 1
            )"

            if [[ "$version" == "$highest_stable" ]]; then
              push_latest=true
            fi
          fi

          echo "push_latest=${push_latest}" >> "$GITHUB_OUTPUT"

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build frontend once
        run: mise build-frontend

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Use a PAT so the release is authored by a user account rather
          # than github-actions[bot]. Bot-authored releases don't get
          # GitHub's autolink rendering for commit SHAs and #NNN PR refs.
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
          CHATTO_PUSH_LATEST: ${{ steps.release_meta.outputs.push_latest }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build frontend Docker tags
        id: frontend_tags
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/chattocorp/chatto-client:${{ steps.version.outputs.version }}"
            if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
              echo "ghcr.io/chattocorp/chatto-client:next"
            elif [[ "${{ steps.release_meta.outputs.push_latest }}" == "true" ]]; then
              echo "ghcr.io/chattocorp/chatto-client:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend.prebuilt
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.frontend_tags.outputs.tags }}
          cache-from: type=gha,scope=chatto-client
          cache-to: type=gha,scope=chatto-client,mode=max
