name: release-please

# Maintains a rolling Release PR. As conventional-commit PRs land on main,
# release-please updates the PR with the aggregated changelog and bumped
# versions (cli/version.go + frontend/package.json). Merging the Release
# PR creates the `vX.Y.Z` tag + GitHub Release. The tag push then fires
# ci.yml's `release` job (GoReleaser + frontend image push) as before.
#
# Also runs on `release-*` maintenance branches (e.g. `release-0.0.x`) to
# support backport patches against older versions. release-please keeps a
# separate Release PR per target branch, and the per-branch manifest tracks
# its own latest version, so a backport on `release-0.0.x` bumps from the
# tag reachable on that branch without jumping to main's version.
#
# The `next` branch is a long-lived prerelease line. Commits there bump
# the version as `0.1.0-alpha.N` (rather than `0.0.x`), using a separate
# config + manifest pair so the prerelease setting doesn't leak into
# main's stable releases. GoReleaser is wired up so prerelease tags get
# their own floating `:next` Docker tag and do NOT update `:latest` or
# `:Major.Minor`.
#
# Replaces the old `mise bump` flow (goversion + manual tag + push).
#
# Requires `RELEASE_PLEASE_PAT`: a fine-grained PAT scoped to chattocorp/chatto
# with repository permissions:
#   - Contents:      Read and write
#   - Pull requests: Read and write
#   - Metadata:      Read-only (always required)
# The default GITHUB_TOKEN can't be used because its tag pushes don't
# trigger downstream workflows — ci.yml's `release` job listens on tag push.

on:
  push:
    branches:
      - main
      # Backport maintenance branches (e.g. release-0.0.x). MUST NOT be a
      # plain `release-*` glob: release-please names its own working
      # branches `release-please--branches--…`, which start with
      # `release-` and would match `release-*`, re-firing this workflow
      # on each release-please branch and creating an exponential
      # nested-PR chain. Use a digit-anchored pattern so backport
      # branches still match but release-please's own branches do not.
      - 'release-[0-9]*'
      - next

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      # Push event's ref_name is the branch (main / release-* / next).
      # Captured into env per workflow-injection best practice, even
      # though it's only used as an action input here (never in `run:`).
      TARGET_BRANCH: ${{ github.ref_name }}
      # The `next` prerelease branch uses a separate config + manifest
      # pair so its prerelease semantics don't bleed into main's stable
      # release stream. Backport branches (release-*) share main's
      # config — they cut stable patch releases of older lines.
      CONFIG_FILE: ${{ github.ref_name == 'next' && '.release-please-config-prerelease.json' || '.release-please-config.json' }}
      MANIFEST_FILE: ${{ github.ref_name == 'next' && '.release-please-manifest-prerelease.json' || '.release-please-manifest.json' }}
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: ${{ env.CONFIG_FILE }}
          manifest-file: ${{ env.MANIFEST_FILE }}
          target-branch: ${{ env.TARGET_BRANCH }}
