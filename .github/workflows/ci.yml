name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  test-frontend-unit:
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Run frontend typecheck
        run: cd frontend && pnpm check

      - name: Run frontend lint
        run: cd frontend && pnpm lint

      - name: Run frontend unit tests
        run: cd frontend && pnpm vitest --run

  test-cli:
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build frontend
        run: mise build-frontend

      - name: Run Go tests
        run: cd cli && go test -tags test_endpoints ./...

  test-e2e-build:
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build E2E server
        run: mise build-e2e-server

      - name: Upload E2E server
        uses: actions/upload-artifact@v7
        with:
          name: e2e-server-${{ github.sha }}
          path: frontend/e2e/fixtures/bin/chatto
          if-no-files-found: error
          retention-days: 1

  test-e2e:
    runs-on: ubicloud-standard-4
    name: test-e2e (${{ matrix.shard }}/4)
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Wait for E2E server
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = `e2e-server-${context.sha}`;
            for (let attempt = 0; attempt < 60; attempt += 1) {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId
              });
              if (data.artifacts.some((artifact) => artifact.name === artifactName)) return;
              await new Promise((resolve) => setTimeout(resolve, 5000));
            }
            core.setFailed(`Timed out waiting for ${artifactName}`);

      - name: Download E2E server
        uses: actions/download-artifact@v7
        with:
          name: e2e-server-${{ github.sha }}
          path: frontend/e2e/fixtures/bin

      - name: Prepare E2E server
        run: chmod +x frontend/e2e/fixtures/bin/chatto

      - name: Run E2E tests
        run: cd frontend && pnpm exec playwright test --grep-invert @ffmpeg --shard=${{ matrix.shard }}/4
        env:
          CHATTO_E2E_SKIP_GLOBAL_BUILD: "1"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report-${{ matrix.shard }}-of-4
          path: frontend/playwright-report/
          retention-days: 14

  test-e2e-media:
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-ffmpeg: "true"
          install-cli-deps: "false"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Wait for E2E server
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = `e2e-server-${context.sha}`;
            for (let attempt = 0; attempt < 60; attempt += 1) {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId
              });
              if (data.artifacts.some((artifact) => artifact.name === artifactName)) return;
              await new Promise((resolve) => setTimeout(resolve, 5000));
            }
            core.setFailed(`Timed out waiting for ${artifactName}`);

      - name: Download E2E server
        uses: actions/download-artifact@v7
        with:
          name: e2e-server-${{ github.sha }}
          path: frontend/e2e/fixtures/bin

      - name: Prepare E2E server
        run: chmod +x frontend/e2e/fixtures/bin/chatto

      - name: Run media E2E tests
        run: cd frontend && pnpm exec playwright test --grep @ffmpeg
        env:
          CHATTO_E2E_SKIP_GLOBAL_BUILD: "1"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report-media
          path: frontend/playwright-report/
          retention-days: 14
