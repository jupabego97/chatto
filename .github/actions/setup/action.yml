name: "Setup Environment"
description: "Sets up mise with caching, then installs Go, Node.js, pnpm, and dependencies"
inputs:
  install-ffmpeg:
    description: "Install ffmpeg (only needed for E2E tests with video processing)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    # mise-action installs mise and the tools defined in mise.toml (Go, Node)
    # with automatic caching of the tool installations
    - name: Setup mise
      uses: jdx/mise-action@v4
      with:
        experimental: true

    # pnpm is not available as a mise plugin, so install via npm (comes with Node)
    - name: Install pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: go-${{ runner.os }}-${{ hashFiles('cli/go.sum') }}
        restore-keys: |
          go-${{ runner.os }}-

    - name: Install ffmpeg (required for video processing e2e tests)
      if: inputs.install-ffmpeg == 'true'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq ffmpeg

    - name: Install CLI dependencies
      shell: bash
      run: mise deps-cli

    - name: Install Frontend dependencies
      shell: bash
      run: mise deps-frontend
